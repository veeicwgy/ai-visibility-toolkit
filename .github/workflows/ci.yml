name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate-and-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate data
        run: python scripts/validate_data.py --repo-root .

      - name: Run quickstart smoke test
        run: bash ./quickstart.sh

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geo-monitor-toolkit-artifacts
          path: |
            data/leaderboards/
            data/runs/quickstart-run/
            data/runs/sample-run/weekly_report.md
            assets/leaderboard-sample.png
            assets/repair-trend-sample.png
